name: lac

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: playground

jobs:
  lac:
    name: Build & lint nodes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build @lifeascode/lac from source
        working-directory: .
        run: |
          bun install
          bun run build
          npm install -g .

      - name: lac build
        run: lac build .
        # Emits .lac/graph.json — fails if any node has a parse error

      - name: lac lint
        run: lac lint .
        # Fails on schema errors; warnings for incomplete fields

      - name: lac status
        run: lac status .
        # Print health summary — does not fail the build
        continue-on-error: true

      - name: lac gitbook
        run: lac gitbook . --role all -o docs
        # Export GitBook-compatible Markdown to docs/

      - name: Commit GitBook docs
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playground/docs/
          git diff --staged --quiet || git commit -m "chore: sync gitbook docs [skip ci]"
          git push
